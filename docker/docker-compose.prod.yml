services:
  audit:
    build:
      context: ../
      dockerfile: services/audit/dockerfile
    env_file:
      - .env
      - .env.prod
    ports:
      - '${AUDIT_SERVICE}:${AUDIT_SERVICE}'
    networks: [app-network]

  auth:
    build:
      context: ../
      dockerfile: services/auth/dockerfile
    env_file:
      - .env
      - .env.prod
    ports:
      - '${AUTH_SERVICE}:${AUTH_SERVICE}'
    networks: [app-network]

  invite:
    build:
      context: ../
      dockerfile: services/invite/dockerfile
    env_file:
      - .env
      - .env.prod
    ports:
      - '${INVITE_SERVICE}:${INVITE_SERVICE}'
    networks: [app-network]

  metrics:
    build:
      context: ../
      dockerfile: services/metrics/dockerfile
    env_file:
      - .env
      - .env.prod
    ports:
      - '${METRICS_SERVICE}:${METRICS_SERVICE}'
    networks: [app-network]

  org:
    build:
      context: ../
      dockerfile: services/org/dockerfile
    env_file:
      - .env
      - .env.prod
    ports:
      - '${ORG_SERVICE}:${ORG_SERVICE}'
    networks: [app-network]

  users:
    build:
      context: ../
      dockerfile: services/users/dockerfile
    env_file:
      - .env
      - .env.prod
    ports:
      - '${USERS_SERVICE}:${USERS_SERVICE}'
    networks: [app-network]

networks:
  app-network:
    external: true
    name: qucore_auth_network
